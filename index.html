<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Chapter Web ePub Creator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Myanmar:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-main">
                <h1><i class="fa-solid fa-book-open"></i> Web ePub Creator</h1>
                <button id="themeToggleBtn" class="theme-toggle-btn" title="Toggle Dark/Light Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
            <p>အခန်းများစွာ ထည့်သွင်း၍ ကိုယ်ပိုင် ePub စာအုပ် ဖန်တီးပါ</p>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="card">
                    <h3><i class="fa-solid fa-info-circle"></i> စာအုပ်အချက်အလက်</h3>
                    <div class="input-group">
                        <label for="bookTitle">စာအုပ်ခေါင်းစဉ်</label>
                        <input type="text" id="bookTitle" placeholder="ဥပမာ - နွေဦးကဗျာများ">
                    </div>
                    <div class="input-group">
                        <label for="bookAuthor">စာရေးဆရာအမည်</label>
                        <input type="text" id="bookAuthor" placeholder="ဥပမာ - မောင်စွမ်းရည်">
                    </div>
                    <div class="input-group">
                        <label for="coverImage">စာအုပ်မျက်နှာဖုံးပုံ (Cover Image)</label>
                        <input type="file" id="coverImage" accept="image/jpeg, image/png">
                    </div>
                </div>

                <div class="card chapter-card">
                    <div class="chapter-header">
                        <h3><i class="fa-solid fa-list"></i> အခန်းများ စာရင်း</h3>
                        <button id="addChapterBtn" class="btn-sm"><i class="fa-solid fa-plus"></i> တိုးမည်</button>
                    </div>
                    <div id="chapterList" class="chapter-list"></div>
                    <button id="generateBtn" class="btn btn-primary" style="margin-top: 15px;">
                        <i class="fa-solid fa-download"></i> ePub ဖိုင် ထုတ်ယူမည်
                    </button>
                </div>
            </aside>

            <main class="editor-area card">
                <div class="editor-header">
                    <div class="input-group" style="margin-bottom: 0; flex-grow: 1;">
                        <input type="text" id="chapterTitle" placeholder="အခန်းခေါင်းစဉ် ရိုက်ပါ... (ဥပမာ - အခန်း ၁)">
                    </div>
                </div>
                <div id="editor-container"></div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script src="app.js"></script>
</body>
</html>
