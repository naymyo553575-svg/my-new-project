<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced ePub Creator with Authentication</title>
    <!-- Quill Rich Text Editor Stylesheet -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #cccccc;
            --primary-color: #34495e;
            --secondary-color: #2c3e50;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --sidebar-width: 260px;
        }

        body.dark-mode {
            --bg-color: #1e2538;
            --container-bg: #252e3c;
            --text-color: #cfd8dc;
            --border-color: #34495e;
            --primary-color: #51a4fa;
            --secondary-color: #3a4759;
            --success-color: #52be80;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: sans-serif; transition: background-color 0.3s; }
        
        /* Auth Overlay Styling */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(30, 37, 48, 0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: #252e3c; padding: 30px; border-radius: 8px; width: 350px; text-align: center; color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .auth-box h2 { margin-bottom: 20px; font-weight: 500; }
        .auth-box input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #34495e; background: #1e2538; color: #fff; border-radius: 4px; }
        .auth-box button { margin-top: 10px; width: 100%; padding: 10px; background: #51a4fa; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .auth-toggle { text-align: center; margin-top: 15px; font-size: 14px; color: #b0bec5; cursor: pointer; }

        /* Main App Interface */
        header { background-color: var(--secondary-color); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .main-layout { display: flex; flex-wrap: wrap; padding: 20px; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .sidebar { width: var(--sidebar-width); flex: 1 1 260px; display: flex; flex-direction: column; gap: 20px; }
        .content-area { flex: 1 1 600px; background: var(--container-bg); border: 1px solid var(--border-color); border-radius: 6px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .container { max-width: 800px; margin: 0 auto; background: var(--container-bg); padding: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="file"], input[type="email"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; background: var(--container-bg); color: var(--text-color); }
        
        .button, .file-input-label { display: inline-block; padding: 10px 15px; background: var(--primary-color); color: white; border: none; border-radius: 4px; cursor: pointer; text-align: center; text-decoration: none; font-size: 14px; }
        .btn-primary { background-color: var(--primary-color); }
        .btn-secondary { background-color: var(--secondary-color); }
        .btn-success { background-color: var(--success-color); width: 100%; font-size: 16px; font-weight: bold; padding: 12px; margin-top: 10px; }
        .btn-danger { background-color: var(--danger-color); color: white; width: 100%; padding: 8px; border-radius: 4px; margin-top: 5px; }
        .btn-warning { background-color: var(--warning-color); }

        .backup-section { border: 1px solid var(--border-color); padding: 15px; border-radius: 6px; display: flex; flex-direction: column; gap: 10px; }
        .backup-title { font-size: 0.85em; font-weight: bold; text-align: center; }
        .chapter-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; border: 1px solid var(--border-color); padding: 10px; border-radius: 4px; }
        .chapter-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 4px; cursor: pointer; }
        .chapter-item.active { background-color: var(--primary-color); color: white; }
        .chapter-item button { width: auto; padding: 2px 8px; margin: 0; }

        /* Quill Editor Configs */
        #editor-container { height: 400px; background: #fff; color: #000; border-radius: 0 0 4px 4px; }
        body.dark-mode #editor-container { background: #fff; color: #000; }
        body.dark-mode .ql-toolbar { background: #eeeeee; border-radius: 4px 4px 0 0; }
        #pdfStatus { font-size: 0.85em; margin-top: 5px; text-align: center; font-weight: bold; }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; padding: 10px; }
            .sidebar, .content-area { width: 100%; }
        }
    </style>
</head>
<body class="dark-mode">

    <!-- Authentication Overlay Layer -->
    <div id="auth-overlay">
        <div class="auth-box">
            <h2 id="auth-title">Sign In</h2>
            <div id="auth-errors" style="color: var(--danger-color); margin-bottom: 10px; font-size: 14px;"></div>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <button id="auth-submit-btn">အကောင့်ဝင်မည်</button>
            <div id="auth-toggle-mode" class="auth-toggle">အကောင့်အသစ်ဖွင့်ရန် နှိပ်ပါ</div>
        </div>
    </div>

    <!-- Main Content Area -->
    <header>
        <h3 style="margin:0;">🌐 Web ePub Creator Pro</h3>
        <div style="display:flex; gap:10px; align-items:center;">
            <span id="user-display" style="font-size:14px; color:#fff; display:none;"></span>
            <button id="logoutBtn" class="button btn-danger" style="width:auto; margin:0; padding:5px 10px; display:none;">ထွက်မည် (Logout)</button>
            <button id="modeToggle" style="width:auto; padding:5px 10px;" class="button btn-warning">Light Mode</button>
        </div>
    </header>

    <div class="main-layout">
        <div class="sidebar">
            <div class="backup-section">
                <div class="backup-title">💾 စာအုပ် BACKUP စီမံခန့်ခွဲမှု</div>
                <button id="backupBookBtn" class="button btn-secondary">💾 လက်ရှိစာအုပ်ကို ဖိုင်သိမ်းဆည်းမည် (Backup)</button>
                <label class="file-input-label" style="margin:0;">
                    📥 စာအုပ်ဟောင်း ပြန်တင်မည် (Load Backup)
                    <input type="file" id="loadBackupFile" accept=".json" style="display:none;">
                </label>
                <button id="resetAppBtn" class="button btn-danger">🧨 စာအုပ်အသစ်အတွက် အစကပြန်စမည် (Reset)</button>
            </div>

            <div class="form-group">
                <label>စာအုပ်အမည် (Book Title)</label>
                <input type="text" id="bookTitle" placeholder="My Novel">
            </div>
            <div class="form-group">
                <label>စာရေးဆရာ (Author)</label>
                <input type="text" id="bookAuthor" placeholder="Unknown Author">
            </div>
            <div class="form-group">
                <label>မျက်နှာဖုံးပုံ (Cover Image)</label>
                <input type="file" id="coverImage" accept="image/*">
            </div>

            <hr style="border:0; border-top:1px solid var(--border-color); margin:10px 0;">
            <h3>အခန်းများ (Chapters)</h3>
            <button id="addChapterBtn" class="button btn-primary">+ အခန်းတိုးမည် (Add Chapter)</button>
            <div class="chapter-list" id="chapter-list"></div>
        </div>

        <div class="content-area">
            <div class="backup-section" style="background: rgba(46, 204, 113, 0.1);">
                <div class="backup-title" style="color: var(--success-color);">📄 PDF မှ စာသားထုတ်ယူရန် (Optional)</div>
                <input type="file" id="pdfFile" accept=".pdf">
                <button id="extractPdfBtn" class="button btn-success" style="margin:0; background-color:var(--success-color);">⚡ PDF မှ စာသားများကို ဆွဲထုတ်မည်</button>
                <div id="pdfStatus"></div>
            </div>

            <div class="form-group">
                <label>အခန်းခေါင်းစဉ် (Chapter Title)</label>
                <input type="text" id="chapterTitle" placeholder="Chapter Title">
                <button id="clearContentBtn" class="button btn-danger">🧹 စာသားအားလုံးဖျက်ရန် (Clear All Content)</button>
            </div>

            <div class="form-group" style="flex:1; display:flex; flex-direction:column;">
                <label>အခန်းတွင်းစာသား (Chapter Content)</label>
                <div id="editor-container"></div>
            </div>

            <button id="downloadEpub" class="button btn-success">📦 ePub ဖိုင် ထုတ်ယူမည်</button>
        </div>
    </div>

    <!-- External Dependent Script Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <!-- Firebase App and Auth SDKs v9 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        // တိုက်ရိုက်အသုံးပြုနိုင်သော သင့်ရဲ့ Firebase Config ဒေတာများ
        const firebaseConfig = {
            apiKey: "AIzaSyAvFwpMaomyi0gknMuxIsTzEOmwZscS6oc",
            authDomain: "epub-creator-pro.firebaseapp.com",
            projectId: "epub-creator-pro",
            storageBucket: "epub-creator-pro.appspot.com",
            messagingSenderId: "50641043495",
            appId: "1:50641043495:web:0f46ca2ea3e3057e62dcb9",
            measurementId: "G-Z3KZPS2ZMB"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isSignUpMode = false;
        const authOverlay = document.getElementById('auth-overlay');
        const authTitle = document.getElementById('auth-title');
        const authSubmitBtn = document.getElementById('auth-submit-btn');
        const authToggleMode = document.getElementById('auth-toggle-mode');
        const emailInput = document.getElementById('auth-email');
        const passwordInput = document.getElementById('auth-password');
        const userDisplay = document.getElementById('user-display');
        const logoutBtn = document.getElementById('logoutBtn');
        const authErrors = document.getElementById('auth-errors');

        // Toggle Sign In / Sign Up Mode
        authToggleMode.addEventListener('click', () => {
            isSignUpMode = !isSignUpMode;
            authErrors.innerText = "";
            if (isSignUpMode) {
                authTitle.innerText = "Sign Up";
                authSubmitBtn.innerText = "အကောင့်အသစ်ဖွင့်မည်";
                authToggleMode.innerText = "ရှိပြီးသားအကောင့်ဖြင့် ဝင်ရန် နှိပ်ပါ";
            } else {
                authTitle.innerText = "Sign In";
                authSubmitBtn.innerText = "အကောင့်ဝင်မည်";
                authToggleMode.innerText = "အကောင့်အသစ်ဖွင့်ရန် နှိပ်ပါ";
            }
        });

        // Authentication Submission Logic
        authSubmitBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            authErrors.innerText = "";

            if (!email || !password) {
                authErrors.innerText = "Email နှင့် Password ကို ရိုက်ထည့်ပေးပါရန်။";
                return;
            }

            try {
                if (isSignUpMode) {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("အကောင့်အသစ် တည်ဆောက်ခြင်း အောင်မြင်ပါသည်။");
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                console.error(error);
                if(error.code === "auth/weak-password") {
                    authErrors.innerText = "Password သည် အနည်းဆုံး ၆ လုံး ရှိရပါမည်။";
                } else if(error.code === "auth/email-already-in-use") {
                    authErrors.innerText = "ဤ Email သည် အသုံးပြုပြီးသား ဖြစ်နေပါသည်။";
                } else if(error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
                    authErrors.innerText = "Email သို့မဟုတ် Password မှားယွင်းနေပါသည်။";
                } else {
                    authErrors.innerText = "အမှားအယွင်းတစ်ခု ရှိနေပါသည်။ ပြန်လည်ကြိုးစားပါ။";
                }
            }
        });

        // Logout Logic
        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                alert("Log out ထွက်လိုက်ပါပြီ။");
            });
        });

        // Monitor User State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authOverlay.style.display = 'none';
                userDisplay.innerText = `Logged in: ${user.email}`;
                userDisplay.style.display = 'inline';
                logoutBtn.style.display = 'inline';
                emailInput.value = '';
                passwordInput.value = '';
            } else {
                authOverlay.style.display = 'flex';
                userDisplay.innerText = '';
                userDisplay.style.display = 'none';
                logoutBtn.style.display = 'none';
            }
        });
    </script>

    <!-- App Business Logic Core Script -->
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Initialize Quill Rich Text Editor
        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['clean']
                ]
            }
        });

        let chapters = [];
        let currentChapterId = null;

        const modeToggle = document.getElementById('modeToggle');
        modeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            if(document.body.classList.contains('dark-mode')) {
                modeToggle.innerText = "Light Mode";
            } else {
                modeToggle.innerText = "Dark Mode";
            }
        });

        function renderChapters() {
            const list = document.getElementById('chapter-list');
            list.innerHTML = '';
            chapters.forEach((ch, index) => {
                const item = document.createElement('div');
                item.className = 'chapter-item' + (ch.id === currentChapterId ? ' active' : '');
                item.onclick = () => selectChapter(ch.id);

                const titleSpan = document.createElement('span');
                titleSpan.innerText = ch.title || `Chapter ${index + 1}`;
                item.appendChild(titleSpan);

                const delBtn = document.createElement('button');
                delBtn.className = 'button btn-danger';
                delBtn.innerText = '✕';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteChapter(ch.id);
                };
                item.appendChild(delBtn);
                list.appendChild(item);
            });
        }

        function selectChapter(id) {
            saveCurrentChapterState();
            currentChapterId = id;
            const ch = chapters.find(c => c.id === id);
            if (ch) {
                document.getElementById('chapterTitle').value = ch.title;
                quill.root.innerHTML = ch.content;
            }
            renderChapters();
        }

        function saveCurrentChapterState() {
            if (currentChapterId !== null) {
                const ch = chapters.find(c => c.id === currentChapterId);
                if (ch) {
                    ch.title = document.getElementById('chapterTitle').value.trim();
                    ch.content = quill.root.innerHTML;
                }
            }
        }

        function deleteChapter(id) {
            if(confirm("ဤအခန်းကို ဖျက်ရန် သေချာပါသလား?")) {
                chapters = chapters.filter(c => c.id !== id);
                if (currentChapterId === id) {
                    currentChapterId = chapters.length > 0 ? chapters[0].id : null;
                }
                if (currentChapterId !== null) {
                    const ch = chapters.find(c => c.id === currentChapterId);
                    document.getElementById('chapterTitle').value = ch.title;
                    quill.root.innerHTML = ch.content;
                } else {
                    document.getElementById('chapterTitle').value = '';
                    quill.root.innerHTML = '';
                }
                renderChapters();
            }
        }

        document.getElementById('addChapterBtn').addEventListener('click', () => {
            saveCurrentChapterState();
            const newId = Date.now().toString();
            const newCh = { id: newId, title: 'အခန်းအသစ် ' + (chapters.length + 1), content: '' };
            chapters.push(newCh);
            currentChapterId = newId;
            document.getElementById('chapterTitle').value = newCh.title;
            quill.root.innerHTML = '';
            renderChapters();
        });

        document.getElementById('clearContentBtn').addEventListener('click', () => {
            if(confirm("ဤအခန်းတွင်းရှိ စာသားအားလုံးကို ဖျက်ပစ်ရန် သေချာပါသလား?")) {
                quill.root.innerHTML = '';
                saveCurrentChapterState();
            }
        });

        document.getElementById('chapterTitle').addEventListener('input', () => {
            if (currentChapterId !== null) {
                const ch = chapters.find(c => c.id === currentChapterId);
                if (ch) {
                    ch.title = document.getElementById('chapterTitle').value.trim();
                    const activeItem = document.querySelector('.chapter-item.active span');
                    if(activeItem) activeItem.innerText = ch.title || 'Untitled Chapter';
                }
            }
        });

        // Backup to JSON file
        document.getElementById('backupBookBtn').addEventListener('click', () => {
            saveCurrentChapterState();
            const bookData = {
                title: document.getElementById('bookTitle').value.trim() || 'My Novel',
                author: document.getElementById('bookAuthor').value.trim() || 'Unknown Author',
                chapters: chapters
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(bookData));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", (bookData.title.replace(/\s+/g, '_')) + "_backup.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });

        // Load from Backup JSON
        document.getElementById('loadBackupFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const importedData = JSON.parse(evt.target.result);
                    document.getElementById('bookTitle').value = importedData.title || '';
                    document.getElementById('bookAuthor').value = importedData.author || '';
                    chapters = importedData.chapters || [];
                    currentChapterId = chapters.length > 0 ? chapters[0].id : null;
                    if (currentChapterId !== null) {
                        document.getElementById('chapterTitle').value = chapters[0].title;
                        quill.root.innerHTML = chapters[0].content;
                    } else {
                        document.getElementById('chapterTitle').value = '';
                        quill.root.innerHTML = '';
                    }
                    renderChapters();
                    alert("စာအုပ် Backup ဒေတာများကို အောင်မြင်စွာ ပြန်လည်တင်သွင်းပြီးပါပြီ။");
                } catch(err) {
                    alert("ဖတ်မရပါ။ မှန်ကန်သော Backup JSON ဖိုင် ဖြစ်ပါစေ။");
                }
            };
            reader.readAsText(file);
        });

        // Reset App
        document.getElementById('resetAppBtn').addEventListener('click', () => {
            if(confirm("သတိပေးချက်- စာအုပ်ဒေတာအားလုံး ပျက်ပါမည်။ အသစ်ပြန်စရန် သေချာပါသလား?")) {
                document.getElementById('bookTitle').value = '';
                document.getElementById('bookAuthor').value = '';
                document.getElementById('coverImage').value = '';
                document.getElementById('chapterTitle').value = '';
                quill.root.innerHTML = '';
                chapters = [];
                currentChapterId = null;
                renderChapters();
            }
        });

        // PDF Text Extraction Logic
        document.getElementById('extractPdfBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('pdfFile');
            const statusDiv = document.getElementById('pdfStatus');
            if (!fileInput.files.length) {
                alert("ကျေးဇူးပြု၍ PDF ဖိုင်တစ်ခု အရင်ရွေးချယ်ပေးပါ။");
                return;
            }
            statusDiv.innerText = "စာသားများ ဆွဲထုတ်နေပါသည်၊ ခေတ္တစောင့်ဆိုင်းပေးပါ...";
            statusDiv.style.color = "var(--warning-color)";
            
            const file = fileInput.files[0];
            const fileReader = new FileReader();
            
            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const pageText = textContent.items.map(item => item.str).join(" ");
                        fullText += pageText + "\n\n";
                    }
                    quill.root.innerHTML = quill.root.innerHTML + "<br><br>" + fullText.replace(/\n/g, '<br>');
                    saveCurrentChapterState();
                    statusDiv.innerText = "PDF မှ စာသားများကို အောင်မြင်စွာ ထည့်သွင်းပြီးပါပြီ။";
                    statusDiv.style.color = "var(--success-color)";
                } catch (error) {
                    console.error(error);
                    statusDiv.innerText = "PDF ဖတ်ရာတွင် အမှားအယွင်းရှိပါသည်။";
                    statusDiv.style.color = "var(--danger-color)";
                }
            };
            fileReader.readAsArrayBuffer(file);
        });

        // ==========================================
        // EPUB GENERATION ENGINE (CORE CRITICAL ZIP)
        // ==========================================
        document.getElementById('downloadEpub').addEventListener('click', async () => {
            saveCurrentChapterState();
            if (chapters.length === 0) {
                alert("ကျေးဇူးပြု၍ အခန်းအနည်းဆုံး တစ်ခန်း ထည့်သွင်းပေးပါ။");
                return;
            }

            const zip = new JSZip();
            const bookTitle = document.getElementById('bookTitle').value.trim() || "My Novel";
            const bookAuthor = document.getElementById('bookAuthor').value.trim() || "Unknown Author";

            // 1. Mimetype File (Must be uncompressed and first)
            zip.file("mimetype", "application/epub+zip", { compression: "STORE" });

            // 2. META-INF/container.xml
            zip.folder("META-INF").file("container.xml", `<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
    <rootfiles>
        <rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/>
    </rootfiles>
</container>`);

            const oebps = zip.folder("OEBPS");

            // Handle Cover Image if exists
            const coverInput = document.getElementById('coverImage');
            let hasCover = false;
            let coverMediaType = "";
            let coverData = null;

            if (coverInput.files.length > 0) {
                const coverFile = coverInput.files[0];
                hasCover = true;
                coverMediaType = coverFile.type || "image/jpeg";
                coverData = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsArrayBuffer(coverFile);
                });
                oebps.file("cover" + getExtension(coverMediaType), coverData);
            }

            // 3. Stylesheet File
            oebps.file("style.css", `body { font-family: sans-serif; padding: 5%; line-height: 1.5; } h1, h2 { text-align: center; color: #2c3e50; } p { margin-bottom: 1em; text-align: justify; } img { max-width: 100%; height: auto; display: block; margin: 10px auto; }`);

            // 4. Generate Chapter Files (XHTML)
            // *** CRITICAL STEP: Entity 'nbsp' not defined Fix ***
            chapters.forEach((ch, index) => {
                // စာသားထဲမှာ ပါဝင်နေတဲ့ Entity 'nbsp' ကုဒ်တွေကို EPUB က လက်ခံတဲ့ သာမန် Spacebar အဖြစ် အလိုအလျောက် သန့်စင်ပေးခြင်း
                let cleanedContent = (ch.content || "")
                    .replaceAll('&nbsp;', ' ')
                    .replaceAll('nbsp', ' ');

                const chHtml = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
    <title>${ch.title || 'Chapter'}</title>
    <link rel="stylesheet" href="style.css" type="text/css"/>
</head>
<body>
    <h2>${ch.title || 'Chapter ' + (index + 1)}</h2>
    <div>${cleanedContent}</div>
</body>
</html>`;
                oebps.file(`chapter_${index + 1}.xhtml`, chHtml);
            });

            // 5. content.opf Generation
            let manifestItems = `
        <item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/>
        <item id="css" href="style.css" media-type="text/css"/>`;
            let spineItems = "";

            if (hasCover) {
                manifestItems += `\n        <item id="cover-image" href="cover${getExtension(coverMediaType)}" media-type="${coverMediaType}"/>`;
            }

            chapters.forEach((ch, index) => {
                manifestItems += `\n        <item id="ch_${index + 1}" href="chapter_${index + 1}.xhtml" media-type="application/xhtml+xml"/>`;
                spineItems += `\n        <itemref idref="ch_${index + 1}"/>`;
            });

            const opfXml = `<?xml version="1.0" encoding="UTF-8"?>
<package xmlns="http://www.idpf.org/2007/opf" unique-identifier="bookid" version="2.0">
    <metadata xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:opf="http://www.idpf.org/2007/opf">
        <dc:title>${bookTitle}</dc:title>
        <dc:creator opf:role="aut">${bookAuthor}</dc:creator>
        <dc:identifier id="bookid">urn:uuid:${Date.now()}</dc:identifier>
        <dc:language>en</dc:language>
        ${hasCover ? '<meta name="cover" content="cover-image"/>' : ''}
    </metadata>
    <manifest>${manifestItems}
    </manifest>
    <spine toc="ncx">${spineItems}
    </spine>
</package>`;
            oebps.file("content.opf", opfXml);

            // 6. toc.ncx Generation
            let navPoints = "";
            chapters.forEach((ch, index) => {
                navPoints += `
        <navPoint id="nav_${index + 1}" playOrder="${index + 1}">
            <navLabel><text>${ch.title || 'Chapter ' + (index + 1)}</text></navLabel>
            <content src="chapter_${index + 1}.xhtml"/>
        </navPoint>`;
            });

            const ncxXml = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE ncx PUBLIC "-//NISO//DTD NCX 2005-1//EN" "http://www.daisy.org/z3986/2005/ncx-2005-1.dtd">
<ncx xmlns="http://www.daisy.org/z3986/2005/ncx--" version="2005-1">
    <head>
        <meta name="dtb:uid" content="urn:uuid:id_here"/>
        <meta name="dtb:depth" content="1"/>
        <meta name="dtb:totalPageCount" content="0"/>
        <meta name="dtb:maxPageNumber" content="0"/>
    </head>
    <docTitle><text>${bookTitle}</text></docTitle>
    <navMap>${navPoints}
    </navMap>
</ncx>`;
            oebps.file("toc.ncx", ncxXml);

            // Generate Blob and Trigger Download
            zip.generateAsync({ type: "blob" }).then((content) => {
                const a = document.createElement("a");
                a.href = URL.createObjectURL(content);
                a.download = `${bookTitle.replace(/\s+/g, '_')}.epub`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        });

        function getExtension(mimeType) {
            if (mimeType === "image/png") return ".png";
            if (mimeType === "image/gif") return ".gif";
            if (mimeType === "image/webp") return ".webp";
            return ".jpg";
        }
    </script>
</body>
</html>
